<!DOCTYPE html>
<html>
<head>
    <title>Socket.IO Test</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        #log { background: #fff; padding: 10px; border: 1px solid #ccc; height: 300px; overflow-y: auto; font-family: monospace; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Socket.IO Connectivity Test</h1>
    <p>Testing connection to: <span id="url"></span></p>
    <div id="log"></div>
    <button onclick="window.location.reload()">Retry</button>

    <script>
        const logDiv = document.getElementById('log');
        const urlSpan = document.getElementById('url');
        const url = window.location.origin;
        urlSpan.textContent = url;

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        log(`Initializing Socket.IO with path: /socket.io`);
        const socket = io(url, {
            path: '/socket.io',
            transports: ['polling', 'websocket'],
            reconnectionAttempts: 3
        });

        socket.on('connect', () => {
            log(`CONNECTED! Transport: ${socket.io.engine.transport.name}`, 'success');
        });

        socket.on('connect_error', (err) => {
            log(`CONNECTION ERROR: ${err.message} ${err.description ? `(${err.description})` : ''}`, 'error');
            console.error(err);
        });

        socket.on('disconnect', (reason) => {
            log(`DISCONNECTED: ${reason}`);
        });

        // Test polling only
        setTimeout(() => {
            if (!socket.connected) {
                log('Attempting polling-only connection...', 'info');
                const pollSocket = io(url, {
                    path: '/socket.io/',
                    transports: ['polling'],
                    reconnectionAttempts: 3
                });
                pollSocket.on('connect', () => log('POLLING CONNECTED!', 'success'));
                pollSocket.on('connect_error', (err) => log(`POLLING ERROR: ${err.message}`, 'error'));
            }
        }, 5000);
    </script>
</body>
</html>
